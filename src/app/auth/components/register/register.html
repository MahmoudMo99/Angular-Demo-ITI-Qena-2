<div class="row d-flex justify-content-center mt-5">
  <div class="col-6">
    <!-- Reactive Form -->
    <h5>Register Form</h5>

    <div class="card p-3">
      <form [formGroup]="registerForm" (ngSubmit)="register()">
        <label for="">username:</label>

        <input
          type="text"
          class="form-control mt-2"
          formControlName="username"
          required
          [class.is-valid]="username?.valid && username?.touched"
          [class.is-invalid]="username?.invalid && username?.touched"
        />

        @if (username?.invalid && username?.touched) {
          <div class="text-danger">User name is required.</div>
        }

        @if (username?.valid && username?.touched) {
          <div class="text-success">User name is Valid.</div>
        }

        <div class="mt-3">
          <label for="">password:</label>
          <input
            type="password"
            class="form-control mt-2"
            formControlName="password"
            required
            [class.is-valid]="password?.valid && password?.touched"
            [class.is-invalid]="password?.invalid && password?.touched"
          />

          @if (password?.invalid && password?.touched) {
            <div class="text-danger">Password is required.</div>
          }

          @if (password?.valid && password?.touched) {
            <div class="text-success">Password is Valid.</div>
          }
        </div>

        <div class="d-flex justify-content-center">
          <button type="submit" class="btn btn-primary mt-4 px-5" [disabled]="registerForm.invalid">
            Register
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
