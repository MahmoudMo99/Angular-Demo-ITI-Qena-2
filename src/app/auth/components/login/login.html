<div class="row d-flex justify-content-center mt-5">
  <div class="col-6">
    <h5>Login Form</h5>

    <div class="card p-3">
      <!-- Template Driven -->
      <!-- ngModel -->

      <!-- Template Variable # -->
      <!-- [(ngModel)]="user" exported as ngModel -->
      <!-- this is form: is Angular Form -->

      <!-- ngForm: formGroup -->

      <form #loginForm="ngForm" (ngSubmit)="login(loginForm)">
        <label for="">username:</label>

        <input
          ngModel
          name="user"
          #userCtl="ngModel"
          type="text"
          class="form-control mt-2"
          required
          [class.is-valid]="userCtl.valid && userCtl.touched"
          [class.is-invalid]="userCtl.invalid && userCtl.touched"
        />

        @if (userCtl.invalid && userCtl.touched) {
          <div class="text-danger">Username is required.</div>
        }
        @if (userCtl.valid && userCtl.touched) {
          <div class="text-success">Username is Valid.</div>
        }

        <div class="mt-3">
          <label for="">password:</label>
          <input
            ngModel
            name="password"
            #passCtl="ngModel"
            type="password"
            class="form-control mt-2"
            required
            [class.is-valid]="passCtl.valid && passCtl.touched"
            [class.is-invalid]="passCtl.invalid && passCtl.touched"
          />

          @if (passCtl.invalid && passCtl.touched) {
            <div class="text-danger">Username is required.</div>
          }
          @if (passCtl.valid && passCtl.touched) {
            <div class="text-success">Username is Valid.</div>
          }
        </div>

        <div class="d-flex justify-content-center">
          <button type="submit" class="btn btn-primary mt-4 px-5" [disabled]="loginForm.invalid">
            Login
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
