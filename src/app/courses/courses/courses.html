<div class="my-3">
  <label for="name">Track Name:</label>
  <input id="name" type="text" class="form-control my-2" [(ngModel)]="trackName" />

  <button class="btn btn-primary" (click)="addTrack()" [disabled]="!trackName">Add Track</button>
</div>

<div class="mb-3 text-center fs-3">
  {{ currentDate | date: 'medium' }}
</div>

<div class="my-3">
  <input
    class="form-control"
    type="text"
    placeholder="Search By Name..."
    [(ngModel)]="searchTerm"
    (input)="filterTracks()"
  />
</div>

<div class="row g-3">
  @for (t of filteredTracks; track t.id; let i = $index) {
    <div class="col-12 col-md-6 col-lg-4">
      <app-track-card
        [trackItem]="t"
        (deleted)="deleteTrack($event)"
        (inserted)="increaseStd($event)"
      ></app-track-card>
    </div>
  } @empty {
    <div class="text-center bg-danger p-3 mt-5">Tracks Not Found</div>
  }
</div>
